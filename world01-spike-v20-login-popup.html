<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1000 Rejections</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=DM+Mono:wght@300&family=ZCOOL+KuaiLe&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #03050c;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  cursor: default;
  user-select: none;
}

canvas#starfield {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

.counter {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
}

.counter-number {
  font-family: 'Cabin Sketch', cursive;
  font-weight: 700;
  font-size: clamp(100px, 25vw, 260px);
  color: #f5c832;
  line-height: 1;
  letter-spacing: 0.02em;
  opacity: 0.95;
  transition: opacity 0.3s ease;
  text-shadow: 0 0 30px rgba(245, 200, 50, 0.4), 0 0 10px rgba(245, 200, 50, 0.2);
}

.counter-label {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: clamp(20px, 4vw, 36px);
  color: #3a7bf7;
  opacity: 0.9;
  margin-top: 12px;
  letter-spacing: 0.1em;
  text-shadow: 0 0 15px rgba(58, 123, 247, 0.5);
}

.planet-hint {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 14px;
  color: #3a7bf7;
  opacity: 0;
  margin-top: 20px;
  letter-spacing: 0.05em;
  transition: opacity 0.8s ease;
  text-shadow: 0 0 10px rgba(58, 123, 247, 0.3);
}
.planet-hint.visible { opacity: 0.6; }

.add-btn {
  position: fixed;
  bottom: 40px;
  right: 40px;
  z-index: 20;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2px solid rgba(245, 200, 50, 0.3);
  background: rgba(3, 5, 12, 0.5);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.4s ease;
  box-shadow: 0 0 20px rgba(245, 200, 50, 0.1);
}
.add-btn:hover {
  border-color: #f5c832;
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(245, 200, 50, 0.3);
}
.add-btn:active { transform: scale(0.95); }
.add-btn svg {
  width: 24px; height: 24px;
  stroke: #f5c832;
  stroke-width: 2;
  transition: stroke 0.4s ease;
}

.input-bar {
  position: fixed;
  bottom: 0; left: 0; width: 100%;
  z-index: 30;
  padding: 24px 40px 40px;
  background: linear-gradient(transparent, rgba(3, 5, 12, 0.95) 60%);
  transform: translateY(100%);
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
  pointer-events: none;
}
.input-bar.active { transform: translateY(0); opacity: 1; pointer-events: all; }

.input-field {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  display: block;
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(245, 200, 50, 0.3);
  padding: 12px 0;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 20px;
  color: #f5c832;
  outline: none;
  letter-spacing: 0.05em;
  text-align: center;
  text-shadow: 0 0 10px rgba(245, 200, 50, 0.3);
}
.input-field::placeholder { color: rgba(42, 91, 255, 0.5); }
.input-field:focus { border-bottom-color: #f5c832; }

.input-hint {
  max-width: 480px;
  margin: 12px auto 0;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 14px;
  text-align: center;
  color: rgba(245, 200, 50, 0.6);
}

.tooltip {
  position: fixed;
  z-index: 25;
  padding: 10px 16px;
  background: #0d1640;
  border: 1px solid rgba(42, 91, 255, 0.3);
  border-radius: 8px;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 15px;
  color: #f5c832;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  max-width: 240px;
  line-height: 1.4;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; }

.tagline {
  position: fixed;
  bottom: 48px;
  left: 40px;
  z-index: 10;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 16px;
  color: #3a7bf7;
  letter-spacing: 0.05em;
  text-shadow: 0 0 10px rgba(58, 123, 247, 0.3);
}

.made-it {
  position: fixed;
  top: 32px;
  right: 36px;
  z-index: 20;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 18px;
  color: rgba(255, 75, 62, 0);
  cursor: default;
  transition: all 0.6s ease;
  letter-spacing: 0.05em;
  pointer-events: none;
}
.made-it.visible {
  color: #FF4B3E;
  text-shadow: 0 0 15px rgba(255, 75, 62, 0.4);
  pointer-events: all;
  cursor: pointer;
}
.made-it.visible:hover {
  transform: scale(1.05);
  text-shadow: 0 0 20px rgba(255, 75, 62, 0.8);
}

.confirm-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(3, 5, 12, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
.confirm-overlay.active { opacity: 1; pointer-events: all; }

.confirm-box { text-align: center; max-width: 360px; padding: 40px; }
.confirm-title {
  font-family: 'Cabin Sketch', cursive;
  font-weight: 700;
  font-size: 72px;
  color: #f5c832;
  text-shadow: 0 0 30px rgba(245, 200, 50, 0.4);
  margin-bottom: 8px;
}
.confirm-sub {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 18px;
  color: rgba(42, 91, 255, 0.8);
  margin-bottom: 32px;
  line-height: 1.6;
  text-shadow: 0 0 10px rgba(42, 91, 255, 0.3);
}
.confirm-buttons { display: flex; gap: 16px; justify-content: center; }
.confirm-buttons button {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 16px;
  padding: 10px 28px;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.05em;
}
.btn-seal {
  background: #f5c832;
  border: none;
  color: #0d1640;
  box-shadow: 0 0 15px rgba(245, 200, 50, 0.4);
}
.btn-seal:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(245, 200, 50, 0.6); }
.btn-cancel {
  background: transparent;
  border: 2px solid #2A5BFF;
  color: #2A5BFF;
}
.btn-cancel:hover { background: rgba(42, 91, 255, 0.1); }

.galaxy-toggle {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: none;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 8px 20px;
  border-radius: 20px;
  border: 1px solid rgba(42, 91, 255, 0.4);
  background: #0d1640;
  transition: all 0.3s ease;
}
.galaxy-toggle:hover { border-color: #2A5BFF; box-shadow: 0 0 15px rgba(42, 91, 255, 0.2); }
.galaxy-toggle svg {
  width: 16px; height: 16px;
  stroke: #f5c832;
  stroke-width: 2;
  fill: none;
}
.galaxy-toggle span {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 14px;
  color: #f5c832;
}

.galaxy-panel {
  position: fixed;
  inset: 0;
  z-index: 40;
  background: #03050c;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.galaxy-panel.active { opacity: 1; pointer-events: all; }

.galaxy-title {
  position: absolute;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 24px;
  color: #3a7bf7;
  text-shadow: 0 0 15px rgba(58, 123, 247, 0.4);
  z-index: 2;
}
.galaxy-close {
  position: absolute;
  top: 32px;
  right: 40px;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 16px;
  color: #FF4B3E;
  cursor: pointer;
  background: none;
  border: none;
  z-index: 2;
  transition: all 0.3s ease;
  text-shadow: 0 0 10px rgba(255, 75, 62, 0.3);
}
.galaxy-close:hover { text-shadow: 0 0 15px rgba(255, 75, 62, 0.6); }
.galaxy-info {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 14px;
  color: rgba(42, 91, 255, 0.5);
  z-index: 2;
  text-align: center;
}

.category-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(3, 5, 12, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
.category-overlay.active { opacity: 1; pointer-events: all; }

.category-options {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  max-width: 360px;
}
.cat-btn {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 16px;
  padding: 10px 24px;
  border-radius: 20px;
  border: 1.5px solid rgba(42, 91, 255, 0.4);
  background: rgba(13, 22, 64, 0.8);
  color: #3a7bf7;
  cursor: pointer;
  transition: all 0.3s ease;
  text-shadow: 0 0 8px rgba(58, 123, 247, 0.3);
}
.cat-btn:hover {
  border-color: #f5c832;
  color: #f5c832;
  box-shadow: 0 0 15px rgba(245, 200, 50, 0.2);
  text-shadow: 0 0 10px rgba(245, 200, 50, 0.3);
}
.cat-custom {
  max-width: 240px;
  text-align: center;
}

.auth-shell {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(circle at top, rgba(42, 91, 255, 0.16), transparent 42%),
    rgba(3, 5, 12, 0.55);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.auth-shell.visible { opacity: 1; pointer-events: all; }

.auth-card {
  width: min(100%, 460px);
  position: relative;
  padding: 32px 24px 24px;
  border: 1px solid rgba(42, 91, 255, 0.28);
  border-radius: 20px;
  background:
    linear-gradient(180deg, rgba(19, 31, 84, 0.96), rgba(8, 14, 42, 0.94));
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), 0 0 40px rgba(42, 91, 255, 0.16);
}

.auth-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.04);
  color: rgba(245, 200, 50, 0.72);
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
}
.auth-close:hover {
  background: rgba(245, 200, 50, 0.12);
  color: #f5c832;
  transform: scale(1.04);
}

.auth-kicker {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #3a7bf7;
}

.auth-title {
  margin-top: 12px;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: clamp(24px, 4vw, 34px);
  line-height: 1.3;
  color: #f5c832;
  text-shadow: 0 0 18px rgba(245, 200, 50, 0.2);
}

.auth-copy,
.auth-config,
.auth-message {
  margin-top: 10px;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 16px;
  line-height: 1.6;
  color: rgba(245, 200, 50, 0.72);
}

.auth-config {
  padding: 10px 12px;
  border: 1px solid rgba(42, 91, 255, 0.22);
  border-radius: 12px;
  background: rgba(42, 91, 255, 0.08);
  color: rgba(58, 123, 247, 0.92);
}

.auth-label {
  display: block;
  margin-top: 18px;
  margin-bottom: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(245, 200, 50, 0.75);
}

.auth-input {
  width: 100%;
  border: 1px solid rgba(42, 91, 255, 0.26);
  border-radius: 12px;
  padding: 14px 16px;
  background: rgba(3, 5, 12, 0.78);
  color: #f5c832;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.auth-input:focus {
  border-color: #3a7bf7;
  box-shadow: 0 0 0 3px rgba(42, 91, 255, 0.14);
}
.auth-input::placeholder { color: rgba(245, 200, 50, 0.2); }

.auth-actions {
  display: flex;
  gap: 12px;
  margin-top: 14px;
}

.auth-btn {
  flex: 1;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid rgba(245, 200, 50, 0.35);
  background: rgba(245, 200, 50, 0.12);
  color: #f5c832;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 15px;
  cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
}
.auth-btn:hover {
  transform: translateY(-1px);
  border-color: #f5c832;
  background: rgba(245, 200, 50, 0.18);
}
.auth-btn:disabled {
  cursor: not-allowed;
  opacity: 0.45;
  transform: none;
}

.session-badge {
  position: fixed;
  top: 28px;
  left: 28px;
  z-index: 35;
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(42, 91, 255, 0.24);
  background: rgba(13, 22, 64, 0.72);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 18px rgba(42, 91, 255, 0.12);
}
.session-badge.visible { display: flex; }

.auth-trigger {
  position: fixed;
  top: 28px;
  right: 28px;
  z-index: 35;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid rgba(42, 91, 255, 0.24);
  background: rgba(13, 22, 64, 0.72);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 18px rgba(42, 91, 255, 0.12);
  color: #f5c832;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 14px;
  cursor: pointer;
  transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.auth-trigger:hover {
  border-color: rgba(245, 200, 50, 0.46);
  transform: translateY(-1px);
  box-shadow: 0 0 24px rgba(245, 200, 50, 0.14);
}
.auth-trigger.hidden { display: none; }

.session-email {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: rgba(245, 200, 50, 0.9);
}

.session-signout {
  border: none;
  background: transparent;
  color: #3a7bf7;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 14px;
  cursor: pointer;
}

.sync-pill {
  position: fixed;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 35;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid rgba(42, 91, 255, 0.2);
  background: rgba(13, 22, 64, 0.65);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(245, 200, 50, 0.75);
}
.sync-pill.syncing { color: #3a7bf7; border-color: rgba(42, 91, 255, 0.35); }
.sync-pill.saved { color: #f5c832; }
.sync-pill.error { color: #FF4B3E; border-color: rgba(255, 75, 62, 0.3); }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<button class="auth-trigger" id="authTrigger">登录并同步</button>

<div class="auth-shell" id="authShell">
  <div class="auth-card">
    <button class="auth-close" id="authCloseBtn" type="button" aria-label="关闭登录弹窗">×</button>
    <div class="auth-kicker">Supabase Magic Link</div>
    <div class="auth-title">不用跳转页面，在这里完成登录</div>
    <div class="auth-copy">输入邮箱后，点击邮件里的登录链接，就会自动回到这个宇宙。登录成功后，你的拒绝星团和已凝聚的星球会继续同步保存。</div>
    <div class="auth-config" id="authConfigHint">Supabase 邮件模板请使用 <code>{{ .ConfirmationURL }}</code>，并把当前页面加入 Supabase 的允许回跳地址。</div>

    <label class="auth-label" for="emailInput">Email</label>
    <input class="auth-input" id="emailInput" type="email" placeholder="you@example.com" autocomplete="email">
    <div class="auth-actions">
      <button class="auth-btn" id="sendMagicLinkBtn">发送登录链接</button>
    </div>

    <div class="auth-message" id="authMessage">未登录。</div>
  </div>
</div>

<div class="session-badge" id="sessionBadge">
  <span class="session-email" id="sessionEmail">未登录</span>
  <button class="session-signout" id="signOutBtn">退出</button>
</div>

<div class="sync-pill" id="syncPill">未连接</div>

<div class="counter">
  <div class="counter-number" id="count">0</div>
  <div class="counter-label">次被拒绝</div>
  <div class="planet-hint" id="planetHint">点击底部星系图标，查看你的星系</div>
</div>

<button class="add-btn" id="addBtn">
  <svg viewBox="0 0 24 24" fill="none">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<div class="made-it" id="madeIt">我做到了</div>

<div class="input-bar" id="inputBar">
  <input class="input-field" id="inputField"
    type="text" placeholder="这次，被拒绝了什么？"
    maxlength="120" autocomplete="off">
  <div class="input-hint">回车保存 · esc跳过</div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="tagline">收集1000次拒绝</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmCount">0</div>
    <div class="confirm-sub">次被拒绝<br>凝聚成一颗星球？</div>
    <div class="confirm-buttons">
      <button class="btn-seal" id="btnSeal">凝聚</button>
      <button class="btn-cancel" id="btnCancel">还没呢</button>
    </div>
  </div>
</div>

<div class="category-overlay" id="categoryOverlay">
  <div class="confirm-box">
    <div class="confirm-sub" style="margin-bottom:16px;font-size:22px;color:#f5c832;">这一轮，你在收集什么的拒绝？</div>
    <div class="category-options" id="categoryOptions">
      <button class="cat-btn" data-cat="求职">求职</button>
      <button class="cat-btn" data-cat="约会">约会</button>
      <button class="cat-btn" data-cat="约稿">约稿</button>
      <button class="cat-btn" data-cat="社交">社交</button>
      <button class="cat-btn" data-cat="创业">创业</button>
      <button class="cat-btn" data-cat="">自定义...</button>
    </div>
    <input class="input-field cat-custom" id="catCustom" type="text" placeholder="输入你的类别"
      maxlength="20" autocomplete="off" style="display:none;margin-top:12px;">
  </div>
</div>

<div class="galaxy-toggle" id="galaxyToggle">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><ellipse cx="12" cy="12" rx="11" ry="4" transform="rotate(-20 12 12)"/></svg>
  <span id="galaxyCount">0 颗星球</span>
</div>

<div class="galaxy-panel" id="galaxyPanel">
  <div class="galaxy-title">你的星系</div>
  <button class="galaxy-close" id="galaxyClose">返回</button>
  <canvas id="galaxyCanvas"></canvas>
  <div class="galaxy-info" id="galaxyInfo"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
const countEl = document.getElementById('count');
const addBtn = document.getElementById('addBtn');
const inputBar = document.getElementById('inputBar');
const inputField = document.getElementById('inputField');
const tooltipEl = document.getElementById('tooltip');
const madeItEl = document.getElementById('madeIt');
const confirmOverlay = document.getElementById('confirmOverlay');
const confirmCountEl = document.getElementById('confirmCount');
const btnSeal = document.getElementById('btnSeal');
const btnCancel = document.getElementById('btnCancel');
const galaxyToggle = document.getElementById('galaxyToggle');
const galaxyPanel = document.getElementById('galaxyPanel');
const galaxyCanvas = document.getElementById('galaxyCanvas');
const galaxyClose = document.getElementById('galaxyClose');
const galaxyCountEl = document.getElementById('galaxyCount');
const galaxyInfo = document.getElementById('galaxyInfo');
const planetHintEl = document.getElementById('planetHint');
const categoryOverlay = document.getElementById('categoryOverlay');
const catCustom = document.getElementById('catCustom');
const authShell = document.getElementById('authShell');
const authTrigger = document.getElementById('authTrigger');
const authCloseBtn = document.getElementById('authCloseBtn');

function serializeClusters() {
  return clusters.map((cluster) => ({
    text: cluster.text || '',
    created_at: cluster.createdAtIso,
    category: cluster.category || '',
  }));
}

function serializePlanets() {
  return planets.map((planet) => ({
    count: planet.count,
    category: planet.category,
    start_date: planet.startDate.toISOString(),
    end_date: planet.endDate.toISOString(),
    colors: planet.colors,
    has_ring: planet.hasRing,
    ring_tilt: planet.ringTilt,
    orbit_radius: planet.orbitRadius,
    orbit_speed: planet.orbitSpeed,
    orbit_offset: planet.orbitOffset,
    size: planet.size,
  }));
}

function buildStatePayload() {
  return {
    user_id: currentSession.user.id,
    email: currentSession.user.email || emailInput.value.trim(),
    active_entries: serializeClusters(),
    jars: serializePlanets(),
    round_started_at: roundStart.toISOString(),
    updated_at: new Date().toISOString(),
  };
}

async function persistState() {
  if (!supabaseClient || !currentSession || hydratingRemoteState) return;
  if (saveInFlight) {
    pendingSave = true;
    return;
  }

  saveInFlight = true;
  setSyncState('同步中', 'syncing');

  try {
    const { error } = await supabaseClient
      .from(STORAGE_TABLE)
      .upsert(buildStatePayload(), { onConflict: 'user_id' });

    if (error) throw error;
    setSyncState('已同步', 'saved');
  } catch (error) {
    console.error(error);
    setSyncState('同步失败', 'error');
    setAuthMessage('Supabase 保存失败：' + error.message, true);
  } finally {
    saveInFlight = false;
    if (pendingSave) {
      pendingSave = false;
      persistState();
    }
  }
}

function schedulePersist(immediate) {
  if (!supabaseClient || !currentSession || hydratingRemoteState) return;
  if (persistTimer) clearTimeout(persistTimer);
  if (immediate) {
    persistState();
    return;
  }
  persistTimer = setTimeout(() => {
    persistTimer = null;
    persistState();
  }, 400);
}

function restorePlanets(rawPlanets) {
  planets = Array.isArray(rawPlanets) ? rawPlanets.map((planet, index) => ({
    count: Number(planet.count) || 0,
    category: planet.category || '未分类',
    startDate: planet.start_date ? new Date(planet.start_date) : new Date(),
    endDate: planet.end_date ? new Date(planet.end_date) : new Date(),
    colors: planet.colors || {
      glow: GLOW_COLORS[index % GLOW_COLORS.length],
      base: GLOW_COLORS[index % GLOW_COLORS.length].mid,
      accent: GLOW_COLORS[index % GLOW_COLORS.length].core,
      ring: GLOW_COLORS[index % GLOW_COLORS.length].outer,
    },
    hasRing: Boolean(planet.has_ring),
    ringTilt: planet.ring_tilt || 0,
    orbitRadius: planet.orbit_radius || (60 + index * 55),
    orbitSpeed: planet.orbit_speed || (0.0003 + Math.random() * 0.0002),
    orbitOffset: planet.orbit_offset || (Math.random() * Math.PI * 2),
    size: planet.size || Math.min(12 + (Number(planet.count) || 0) * 0.15, 28),
  })) : [];
  updateGalaxyToggle();
}

function applyRemoteState(row) {
  hydratingRemoteState = true;
  resetLocalExperience();
  roundStart = row && row.round_started_at ? new Date(row.round_started_at) : new Date();
  restorePlanets(row && row.jars);

  const activeEntries = Array.isArray(row && row.active_entries) ? row.active_entries : [];
  if (activeEntries.length > 0) {
    currentCategory = activeEntries[0].category || '';
    needsCategory = !currentCategory;
  } else {
    currentCategory = '';
    needsCategory = true;
  }

  activeEntries.forEach((entry) => {
    createCluster(entry.text || '', {
      createdAtIso: entry.created_at,
      category: entry.category || currentCategory,
      skipPersist: true,
      skipMilestones: true,
    });
  });

  hydratingRemoteState = false;
  render(performance.now());
  startIdle();
}

async function loadRemoteState() {
  if (!supabaseClient || !currentSession) return;
  setSyncState('加载中', 'syncing');

  try {
    const { data, error } = await supabaseClient
      .from(STORAGE_TABLE)
      .select('active_entries, jars, round_started_at')
      .eq('user_id', currentSession.user.id)
      .maybeSingle();

    if (error) throw error;

    if (data) {
      applyRemoteState(data);
    } else {
      resetLocalExperience();
      await persistState();
    }

    setAuthMessage('已登录：' + currentSession.user.email, false);
  } catch (error) {
    console.error(error);
    setSyncState('加载失败', 'error');
    setAuthMessage('Supabase 读取失败：' + error.message, true);
  }
}

async function handleSessionChange(session) {
  currentSession = session;
  if (!session || !session.user) {
    setSessionVisible(false);
    resetLocalExperience();
    setSyncState(isSupabaseConfigured() ? '未登录' : '未配置', isSupabaseConfigured() ? '' : 'error');
    setAuthMessage(isSupabaseConfigured()
      ? '点击右上角登录弹窗，收邮件里的登录链接后回到这里。'
      : '先填 Supabase 配置，再登录。', !isSupabaseConfigured());
    setAuthShellVisible(false);
    startIdle();
    return;
  }

  sessionEmail.textContent = session.user.email || '已登录';
  setSessionVisible(true);
  setAuthShellVisible(false);
  await loadRemoteState();
}

async function sendMagicLink() {
  if (!isSupabaseConfigured() || !supabaseClient) {
    setAuthMessage('还没配置 Supabase URL / Anon Key。', true);
    return;
  }

  const email = emailInput.value.trim();
  if (!email) {
    setAuthMessage('先输入邮箱。', true);
    emailInput.focus();
    return;
  }

  setAuthButtonsDisabled(true);
  setAuthMessage('正在发送登录链接…', false);

  try {
    const emailRedirectTo = window.location.origin + window.location.pathname;
    const { error } = await supabaseClient.auth.signInWithOtp({
      email,
      options: {
        shouldCreateUser: true,
        emailRedirectTo,
      },
    });

    if (error) throw error;
    setAuthMessage('登录链接已发到邮箱。点击邮件里的链接后会自动回到这里登录。', false);
  } catch (error) {
    console.error(error);
    setAuthMessage('登录链接发送失败：' + error.message, true);
  } finally {
    setAuthButtonsDisabled(false);
  }
}

async function signOut() {
  if (!supabaseClient) return;
  const { error } = await supabaseClient.auth.signOut();
  if (error) {
    console.error(error);
    setAuthMessage('退出失败：' + error.message, true);
  }
}

async function bootSupabase() {
  if (!window.supabase) {
    setAuthMessage('Supabase SDK 没有加载成功。', true);
    setSyncState('SDK失败', 'error');
    return;
  }

  if (!isSupabaseConfigured()) {
    authConfigHint.style.display = 'block';
    setAuthMessage('先配置页面里的 Supabase 常量。', true);
    setSyncState('未配置', 'error');
    return;
  }

  authConfigHint.style.display = 'none';
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      autoRefreshToken: true,
      persistSession: true,
      detectSessionInUrl: true,
    },
  });

  const { data, error } = await supabaseClient.auth.getSession();
  if (error) {
    console.error(error);
    setAuthMessage('读取会话失败：' + error.message, true);
    setSyncState('会话失败', 'error');
    return;
  }

  supabaseClient.auth.onAuthStateChange((_event, session) => {
    handleSessionChange(session);
  });

  await handleSessionChange(data.session);
}

function nextGlowColor() {
  const c = GLOW_COLORS[glowColorIdx % GLOW_COLORS.length];
  glowColorIdx++;
  return c;
}

function drawStar(cx, cy, points, outerR, innerR, rot) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (Math.PI * i) / points - Math.PI / 2 + rot;
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function createCluster(text, options = {}) {
  planetHintEl.classList.remove('visible');
  const margin = 80;
  const safeCx = W / 2;
  const safeCy = H / 2;
  let cx;
  let cy;
  let attempts = 0;
  do {
    cx = rand(margin, W - margin);
    cy = rand(margin, H - margin);
    attempts++;
  } while (Math.abs(cx - safeCx) < 140 && Math.abs(cy - safeCy) < 90 && attempts < 40);

  const numStars = randInt(4, 8);
  const numDust = randInt(6, 14);
  const spread = rand(18, 35);
  const born = performance.now();
  const starItems = [];
  const dustItems = [];

  for (let i = 0; i < numStars; i++) {
    const angle = rand(0, Math.PI * 2);
    const dist = i === 0 ? 0 : rand(3, spread);
    const size = i === 0 ? rand(8, 16) : rand(3, 10);
    starItems.push({
      ox: Math.cos(angle) * dist,
      oy: Math.sin(angle) * dist,
      size,
      points: pick([4, 4, 5, 5, 5, 6]),
      innerRatio: rand(0.35, 0.5),
      rotation: rand(0, Math.PI),
      color: pick(PALETTES),
      delay: i * rand(30, 80),
    });
  }

  for (let i = 0; i < numDust; i++) {
    const angle = rand(0, Math.PI * 2);
    const dist = rand(spread * 0.5, spread * 2.5);
    dustItems.push({
      ox: Math.cos(angle) * dist,
      oy: Math.sin(angle) * dist,
      size: rand(0.5, 2),
      color: pick(PALETTES),
      delay: rand(0, 200),
    });
  }

  const cluster = {
    cx,
    cy,
    text: text || '',
    born,
    createdAtIso: options.createdAtIso || new Date().toISOString(),
    category: options.category || currentCategory || '',
    stars: starItems,
    dust: dustItems,
    twinkleOffset: rand(0, Math.PI * 2),
    twinkleSpeed: rand(0.4, 0.9),
    fadeOutStart: null,
  };

  clusters.push(cluster);
  count++;
  countEl.textContent = count;
  countEl.style.opacity = '1';
  setTimeout(() => { countEl.style.opacity = '0.95'; }, 150);

  if (count >= 3) madeItEl.classList.add('visible');
  const MILESTONES = [10, 50, 100, 200, 500, 1000];
  if (!options.skipMilestones && MILESTONES.includes(count)) triggerMeteorShower();
  if (!animating) {
    animating = true;
    stopIdle();
    requestAnimationFrame(draw);
  }
  if (!options.skipPersist) schedulePersist();
  return cluster;
}

function triggerMeteorShower() {
  const numMeteors = randInt(5, 9);
  const now = performance.now();
  for (let i = 0; i < numMeteors; i++) {
    meteors.push({
      x: rand(W * 0.3, W * 1.1),
      y: rand(-H * 0.2, H * 0.15),
      dx: -Math.cos(rand(0.6, 0.9)) * rand(0.4, 0.9),
      dy: Math.sin(rand(0.6, 0.9)) * rand(0.4, 0.9),
      length: rand(80, 200),
      maxLife: rand(800, 1600),
      delay: i * rand(100, 300),
      born: now,
      width: rand(1, 2.5),
      color: pick(PALETTES),
    });
  }
  skyMessage = { born: now + numMeteors * 150 + 600, duration: 3000 };
  if (!animating) {
    animating = true;
    stopIdle();
    requestAnimationFrame(draw);
  }
}

function renderMeteors(now) {
  let active = false;
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    const age = now - m.born - m.delay;
    if (age < 0) { active = true; continue; }
    if (age > m.maxLife) { meteors.splice(i, 1); continue; }
    active = true;
    const progress = age / m.maxLife;
    const alpha = Math.min(progress * 5, 1) * (1 - progress * progress);
    const headX = m.x + m.dx * age;
    const headY = m.y + m.dy * age;
    const tailX = headX - m.dx * m.length;
    const tailY = headY - m.dy * m.length;
    const grad = ctx.createLinearGradient(tailX, tailY, headX, headY);
    grad.addColorStop(0, `rgba(${m.color.r},${m.color.g},${m.color.b},0)`);
    grad.addColorStop(0.7, `rgba(${m.color.r},${m.color.g},${m.color.b},${alpha * 0.4})`);
    grad.addColorStop(1, `rgba(255,250,220,${alpha * 0.9})`);
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(headX, headY);
    ctx.strokeStyle = grad;
    ctx.lineWidth = m.width;
    ctx.lineCap = 'round';
    ctx.stroke();
    if (alpha > 0.3) {
      const g2 = ctx.createRadialGradient(headX, headY, 0, headX, headY, 8);
      g2.addColorStop(0, `rgba(255,250,220,${alpha * 0.4})`);
      g2.addColorStop(1, 'rgba(255,250,220,0)');
      ctx.beginPath();
      ctx.arc(headX, headY, 8, 0, Math.PI * 2);
      ctx.fillStyle = g2;
      ctx.fill();
    }
  }
  return active;
}

function renderSkyMessage(now) {
  if (!skyMessage) return false;
  const age = now - skyMessage.born;
  if (age < 0) return true;
  if (age > skyMessage.duration) {
    skyMessage = null;
    return false;
  }
  const fadeIn = Math.min(age / 800, 1);
  const fadeOut = age > skyMessage.duration - 800 ? (skyMessage.duration - age) / 800 : 1;
  const alpha = fadeIn * fadeOut * 0.6;
  ctx.save();
  ctx.font = '400 24px "ZCOOL KuaiLe", cursive';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = `rgba(58, 123, 247, ${alpha})`;
  ctx.shadowColor = `rgba(58, 123, 247, ${alpha * 0.5})`;
  ctx.shadowBlur = 15;
  ctx.fillText('天空记得。', W / 2, H / 2 + 100);
  ctx.restore();
  return true;
}

function startSpiral() {
  spiraling = true;
  spiralParticles = [];
  document.querySelector('.counter').style.transition = 'opacity 1.5s ease';
  document.querySelector('.counter').style.opacity = '0';
  const cx = W / 2;
  const cy = H / 2;

  for (const c of clusters) {
    for (const s of c.stars) {
      const px = c.cx + s.ox;
      const py = c.cy + s.oy;
      const dx = px - cx;
      const dy = py - cy;
      spiralParticles.push({
        x: px,
        y: py,
        size: s.size * 0.6,
        color: s.color,
        startAngle: Math.atan2(dy, dx),
        startDist: Math.sqrt(dx * dx + dy * dy),
        delay: rand(0, 400),
        points: s.points,
        innerRatio: s.innerRatio,
        rotation: s.rotation,
      });
    }
    for (const d of c.dust) {
      const px = c.cx + d.ox;
      const py = c.cy + d.oy;
      const dx = px - cx;
      const dy = py - cy;
      spiralParticles.push({
        x: px,
        y: py,
        size: d.size,
        color: d.color,
        startAngle: Math.atan2(dy, dx),
        startDist: Math.sqrt(dx * dx + dy * dy),
        delay: rand(0, 300),
        points: 0,
        innerRatio: 0,
        rotation: 0,
      });
    }
  }

  clusters = [];
  spiralParticles.born = performance.now();
  if (!animating) {
    animating = true;
    stopIdle();
    requestAnimationFrame(draw);
  }
}

function renderSpiral(now) {
  if (!spiraling) return false;
  const age = now - spiralParticles.born;
  const duration = 2500;
  const cx = W / 2;
  const cy = H / 2;
  let active = false;

  for (const p of spiralParticles) {
    const t = Math.max(0, Math.min((age - p.delay) / (duration - p.delay), 1));
    if (t <= 0) { active = true; continue; }
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const dist = p.startDist * (1 - eased);
    const spin = p.startAngle + eased * Math.PI * 3;
    const x = cx + Math.cos(spin) * dist;
    const y = cy + Math.sin(spin) * dist;
    const alpha = t < 0.8 ? 1 : (1 - t) / 0.2;
    const sz = p.size * (1 - eased * 0.5);

    if (p.points > 0) {
      ctx.save();
      ctx.globalAlpha = alpha;
      drawStar(x, y, p.points, sz, sz * p.innerRatio, p.rotation + eased * 2);
      ctx.fillStyle = `rgb(${p.color.r},${p.color.g},${p.color.b})`;
      ctx.fill();
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(x, y, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},${alpha})`;
      ctx.fill();
    }
    if (t < 1) active = true;
  }

  if (age > duration) {
    const glowT = Math.min((age - duration) / 800, 1);
    const glowR = 30 + glowT * 20;
    const c = GLOW_COLORS[glowColorIdx % GLOW_COLORS.length].core;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
    grad.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${glowT * 0.9})`);
    grad.addColorStop(0.6, `rgba(${c[0]},${c[1]},${c[2]},${glowT * 0.3})`);
    grad.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    if (glowT >= 1 && age > duration + 1400) {
      spiraling = false;
      finishSeal();
      return false;
    }
    return true;
  }
  return active || true;
}

function render(now) {
  ctx.clearRect(0, 0, W, H);
  for (const s of bgStars) {
    const tw = 0.7 + 0.3 * Math.sin(now * s.twinkleSpeed + s.twinkleOffset);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${s.color.r},${s.color.g},${s.color.b},${s.alpha * tw})`;
    ctx.fill();
  }

  let hasFadeIn = false;
  for (const c of clusters) {
    const clusterAge = now - c.born;
    const twinkle = 1 + Math.sin(now * 0.001 * c.twinkleSpeed + c.twinkleOffset) * 0.06;
    let fadeOut = 1;
    if (c.fadeOutStart !== null) {
      fadeOut = 1 - Math.min((now - c.fadeOutStart) / 1200, 1);
      if (fadeOut > 0) hasFadeIn = true;
    }
    if (fadeOut <= 0) continue;

    for (const d of c.dust) {
      const age = clusterAge - d.delay;
      if (age < 0) { hasFadeIn = true; continue; }
      const fade = Math.min(age / 600, 1);
      const eased = 1 - Math.pow(1 - fade, 2);
      const alpha = eased * rand(0.3, 0.7) * twinkle * fadeOut;
      if (fade < 1) hasFadeIn = true;
      ctx.beginPath();
      ctx.arc(c.cx + d.ox, c.cy + d.oy, d.size * eased, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${d.color.r},${d.color.g},${d.color.b},${alpha})`;
      ctx.fill();
    }

    for (const s of c.stars) {
      const age = clusterAge - s.delay;
      if (age < 0) { hasFadeIn = true; continue; }
      const fade = Math.min(age / 800, 1);
      const eased = 1 - Math.pow(1 - fade, 3);
      if (fade < 1) hasFadeIn = true;
      const alpha = eased * twinkle * fadeOut;
      const sz = s.size * (0.3 + eased * 0.7);
      const px = c.cx + s.ox;
      const py = c.cy + s.oy;
      if (sz > 5) {
        const glowR = sz * 4;
        const grad = ctx.createRadialGradient(px, py, 0, px, py, glowR);
        grad.addColorStop(0, `rgba(${s.color.r},${s.color.g},${s.color.b},${alpha * 0.3})`);
        grad.addColorStop(0.3, `rgba(${s.color.r},${s.color.g},${s.color.b},${alpha * 0.12})`);
        grad.addColorStop(1, `rgba(${s.color.r},${s.color.g},${s.color.b},0)`);
        ctx.beginPath();
        ctx.arc(px, py, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
      ctx.save();
      ctx.globalAlpha = alpha;
      drawStar(px, py, s.points, sz, sz * s.innerRatio, s.rotation);
      ctx.fillStyle = `rgb(${s.color.r},${s.color.g},${s.color.b})`;
      ctx.fill();
      ctx.restore();
      if (sz > 4) {
        ctx.save();
        ctx.globalAlpha = alpha * 0.6;
        drawStar(px, py, s.points, sz * 0.45, sz * s.innerRatio * 0.3, s.rotation);
        ctx.fillStyle = '#fffde8';
        ctx.fill();
        ctx.restore();
      }
    }
  }

  const spiralActive = renderSpiral(now);
  const meteorsActive = renderMeteors(now);
  const messageActive = renderSkyMessage(now);
  return hasFadeIn || spiralActive || meteorsActive || messageActive;
}

function draw(now) {
  if (render(now)) requestAnimationFrame(draw);
  else {
    animating = false;
    startIdle();
  }
}

function startIdle() {
  if (idleTimer) return;
  idleTimer = setInterval(() => { render(performance.now()); }, 120);
}

function stopIdle() {
  if (idleTimer) {
    clearInterval(idleTimer);
    idleTimer = null;
  }
}

function formatDate(d) {
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[d.getMonth()] + ' ' + d.getDate();
}

function sealJar() {
  sealing = true;
  startSpiral();
}

function finishSeal() {
  sealing = false;
  const glow = nextGlowColor();
  const planet = {
    count,
    category: currentCategory || '未分类',
    startDate: new Date(roundStart),
    endDate: new Date(),
    colors: { glow, base: glow.mid, accent: glow.core, ring: glow.outer },
    hasRing: false,
    ringTilt: 0,
    orbitRadius: 60 + planets.length * 55,
    orbitSpeed: 0.0003 + Math.random() * 0.0002,
    orbitOffset: Math.random() * Math.PI * 2,
    size: Math.min(12 + count * 0.15, 28),
  };
  planets.push(planet);
  count = 0;
  roundStart = new Date();
  currentCategory = '';
  needsCategory = true;
  countEl.textContent = '0';
  madeItEl.classList.remove('visible');
  document.querySelector('.counter').style.opacity = '1';
  animating = false;
  startIdle();
  updateGalaxyToggle();
  schedulePersist(true);
  setTimeout(() => { planetHintEl.classList.add('visible'); }, 1500);
  setTimeout(() => { galaxyPanel.classList.add('active'); drawGalaxy(); }, 2000);
  setTimeout(() => { galaxyPanel.classList.remove('active'); }, 6000);
}

function drawPlanet(c, x, y, size, colors) {
  const gc = colors.glow || GLOW_COLORS[0];
  const outerR = size * 3.5;
  const g3 = c.createRadialGradient(x, y, 0, x, y, outerR);
  g3.addColorStop(0, `rgba(${gc.core[0]},${gc.core[1]},${gc.core[2]},0.06)`);
  g3.addColorStop(0.4, `rgba(${gc.outer[0]},${gc.outer[1]},${gc.outer[2]},0.03)`);
  g3.addColorStop(1, `rgba(${gc.outer[0]},${gc.outer[1]},${gc.outer[2]},0)`);
  c.beginPath();
  c.arc(x, y, outerR, 0, Math.PI * 2);
  c.fillStyle = g3;
  c.fill();

  const g2 = c.createRadialGradient(x, y, 0, x, y, size * 2);
  g2.addColorStop(0, `rgba(${gc.core[0]},${gc.core[1]},${gc.core[2]},0.15)`);
  g2.addColorStop(0.5, `rgba(${gc.mid[0]},${gc.mid[1]},${gc.mid[2]},0.08)`);
  g2.addColorStop(1, `rgba(${gc.mid[0]},${gc.mid[1]},${gc.mid[2]},0)`);
  c.beginPath();
  c.arc(x, y, size * 2, 0, Math.PI * 2);
  c.fillStyle = g2;
  c.fill();

  const g1 = c.createRadialGradient(x - size * 0.2, y - size * 0.2, 0, x, y, size * 1.4);
  g1.addColorStop(0, `rgba(${gc.core[0]},${gc.core[1]},${gc.core[2]},0.95)`);
  g1.addColorStop(0.25, `rgba(${gc.core[0]},${gc.core[1]},${gc.core[2]},0.9)`);
  g1.addColorStop(0.45, `rgba(${gc.mid[0]},${gc.mid[1]},${gc.mid[2]},0.75)`);
  g1.addColorStop(0.65, `rgba(${gc.outer[0]},${gc.outer[1]},${gc.outer[2]},0.4)`);
  g1.addColorStop(0.85, `rgba(${gc.outer[0]},${gc.outer[1]},${gc.outer[2]},0.1)`);
  g1.addColorStop(1, `rgba(${gc.outer[0]},${gc.outer[1]},${gc.outer[2]},0)`);
  c.beginPath();
  c.arc(x, y, size * 1.4, 0, Math.PI * 2);
  c.fillStyle = g1;
  c.fill();

  c.save();
  c.globalAlpha = 0.4;
  const highlight = c.createRadialGradient(
    x - size * 0.3,
    y - size * 0.35,
    size * 0.05,
    x - size * 0.15,
    y - size * 0.15,
    size * 0.5
  );
  highlight.addColorStop(0, 'rgba(255,255,255,0.6)');
  highlight.addColorStop(1, 'rgba(255,255,255,0)');
  c.beginPath();
  c.arc(x, y, size, 0, Math.PI * 2);
  c.fillStyle = highlight;
  c.fill();
  c.restore();
}

function drawGalaxy(now) {
  if (!now) now = performance.now();
  if (!galaxyPanel.classList.contains('active')) {
    galaxyAnimId = null;
    return;
  }

  gCtx.clearRect(0, 0, W, H);
  const cx = W / 2;
  const cy = H / 2;

  for (const s of bgStars) {
    const tw = 0.7 + 0.3 * Math.sin(now * s.twinkleSpeed + s.twinkleOffset);
    gCtx.beginPath();
    gCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    gCtx.fillStyle = `rgba(${s.color.r},${s.color.g},${s.color.b},${s.alpha * tw})`;
    gCtx.fill();
  }

  gCtx.save();
  gCtx.globalAlpha = 0.08;
  const sunGrad = gCtx.createRadialGradient(cx, cy, 0, cx, cy, 20);
  sunGrad.addColorStop(0, '#fff');
  sunGrad.addColorStop(1, 'rgba(255,255,255,0)');
  gCtx.beginPath();
  gCtx.arc(cx, cy, 20, 0, Math.PI * 2);
  gCtx.fillStyle = sunGrad;
  gCtx.fill();
  gCtx.restore();

  gCtx.beginPath();
  gCtx.arc(cx, cy, 4, 0, Math.PI * 2);
  gCtx.fillStyle = 'rgba(255,255,255,0.5)';
  gCtx.fill();

  for (let i = 0; i < planets.length; i++) {
    const planet = planets[i];
    gCtx.save();
    gCtx.globalAlpha = 0.08;
    gCtx.strokeStyle = 'rgba(42,91,255,0.3)';
    gCtx.lineWidth = 0.5;
    gCtx.setLineDash([4, 8]);
    gCtx.beginPath();
    gCtx.arc(cx, cy, planet.orbitRadius, 0, Math.PI * 2);
    gCtx.stroke();
    gCtx.restore();

    const angle = planet.orbitOffset + now * planet.orbitSpeed;
    const px = cx + Math.cos(angle) * planet.orbitRadius;
    const py = cy + Math.sin(angle) * planet.orbitRadius * 0.4;
    drawPlanet(gCtx, px, py, planet.size, planet.colors);

    gCtx.save();
    gCtx.font = '400 13px "ZCOOL KuaiLe", cursive';
    gCtx.textAlign = 'center';
    gCtx.fillStyle = `rgba(${planet.colors.accent[0]},${planet.colors.accent[1]},${planet.colors.accent[2]},0.7)`;
    gCtx.fillText(planet.category, px, py + planet.size + 16);
    gCtx.fillStyle = 'rgba(255,255,255,0.35)';
    gCtx.font = '400 11px "DM Mono", monospace';
    gCtx.fillText(planet.count + '次 · ' + formatDate(planet.startDate), px, py + planet.size + 32);
    gCtx.restore();
  }

  galaxyAnimId = requestAnimationFrame(drawGalaxy);
}

function openAuthPrompt() {
  setAuthShellVisible(true);
  setAuthMessage('先用邮箱登录，再开始收集。', true);
}

addBtn.addEventListener('click', () => {
  if (!currentSession) {
    openAuthPrompt();
    return;
  }
  if (sealing || spiraling) return;
  if (needsCategory) {
    categoryOverlay.classList.add('active');
    return;
  }
  pendingCluster = createCluster('', { category: currentCategory });
  inputBar.classList.add('active');
  setTimeout(() => inputField.focus(), 100);
});

document.querySelectorAll('.cat-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (!cat) {
      catCustom.style.display = 'block';
      catCustom.focus();
      return;
    }
    currentCategory = cat;
    needsCategory = false;
    categoryOverlay.classList.remove('active');
    catCustom.style.display = 'none';
    pendingCluster = createCluster('', { category: currentCategory });
    inputBar.classList.add('active');
    setTimeout(() => inputField.focus(), 100);
  });
});

catCustom.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && catCustom.value.trim()) {
    currentCategory = catCustom.value.trim();
    needsCategory = false;
    categoryOverlay.classList.remove('active');
    catCustom.style.display = 'none';
    catCustom.value = '';
    pendingCluster = createCluster('', { category: currentCategory });
    inputBar.classList.add('active');
    setTimeout(() => inputField.focus(), 100);
  }
});

inputField.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (pendingCluster) pendingCluster.text = inputField.value.trim();
    closeInput();
  }
  if (e.key === 'Escape') closeInput();
});

function closeInput() {
  inputBar.classList.remove('active');
  schedulePersist();
  inputField.value = '';
  pendingCluster = null;
  addBtn.focus();
}

madeItEl.addEventListener('click', () => {
  if (count === 0 || sealing || spiraling) return;
  confirmCountEl.textContent = count;
  confirmOverlay.classList.add('active');
});

btnSeal.addEventListener('click', () => {
  confirmOverlay.classList.remove('active');
  sealJar();
});

btnCancel.addEventListener('click', () => {
  confirmOverlay.classList.remove('active');
});

galaxyToggle.addEventListener('click', () => {
  galaxyPanel.classList.add('active');
  drawGalaxy();
});

galaxyClose.addEventListener('click', () => {
  galaxyPanel.classList.remove('active');
  if (galaxyAnimId) {
    cancelAnimationFrame(galaxyAnimId);
    galaxyAnimId = null;
  }
});

canvas.addEventListener('mousemove', (e) => {
  const mx = e.clientX;
  const my = e.clientY;
  let closest = null;
  let closestDist = 40;
  for (const c of clusters) {
    if (!c.text) continue;
    const dx = mx - c.cx;
    const dy = my - c.cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) {
      closest = c;
      closestDist = dist;
    }
  }
  if (closest && closest !== hoveredCluster) {
    hoveredCluster = closest;
    tooltipEl.textContent = closest.text;
    tooltipEl.style.left = (closest.cx > W - 280 ? closest.cx - 260 : closest.cx + 16) + 'px';
    tooltipEl.style.top = (closest.cy - 12) + 'px';
    tooltipEl.classList.add('visible');
  } else if (!closest) {
    hoveredCluster = null;
    tooltipEl.classList.remove('visible');
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredCluster = null;
  tooltipEl.classList.remove('visible');
});

document.addEventListener('keydown', (e) => {
  if ((e.key === '+' || e.key === '=') && !inputBar.classList.contains('active') && !sealing && !spiraling) {
    if (!currentSession) {
      openAuthPrompt();
      return;
    }
    addBtn.click();
  }
});

sendMagicLinkBtn.addEventListener('click', sendMagicLink);
signOutBtn.addEventListener('click', signOut);
authTrigger.addEventListener('click', () => {
  setAuthMessage(currentSession
    ? '你已经登录了。'
    : '输入邮箱后，我们会把登录链接发到你的邮箱。', false);
  setAuthShellVisible(true);
});
authCloseBtn.addEventListener('click', () => {
  setAuthShellVisible(false);
});
authShell.addEventListener('click', (e) => {
  if (e.target === authShell) setAuthShellVisible(false);
});
emailInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMagicLink();
  if (e.key === 'Escape') setAuthShellVisible(false);
});

updateGalaxyToggle();
startIdle();
bootSupabase();
</script>
</body>
</html>
